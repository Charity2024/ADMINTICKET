<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Salonist | Premiere Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root {
            --bg-dark: #1a0a05; 
            --accent-gold: #f7941d; 
            --accent-red: #8b1d1d; 
            --text-main: #ffffff;
            --card-bg: #2d1610;
            --success: #4caf50;
            --error: #e53935;
            --warning: #fbc02d;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background-color: var(--bg-dark);
            background-image: linear-gradient(180deg, #2d1610 0%, #1a0a05 100%);
            color: var(--text-main);
            min-height: 100vh;
        }

        header {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 2px solid var(--accent-gold);
            padding: 1rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: sticky; top: 0; z-index: 100;
        }

        #status-bar {
            width: 100%; padding: 5px; text-align: center;
            font-size: 0.7rem; font-weight: bold; display: none;
        }
        .online { background: var(--success); color: white; }
        .offline { background: var(--error); color: white; }

        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }

        .card {
            background: var(--card-bg);
            padding: 20px; border-radius: 12px;
            border: 1px solid rgba(247, 148, 29, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        h3 {
            color: var(--accent-gold); text-transform: uppercase;
            margin-top: 0; font-size: 1rem;
            border-bottom: 1px solid rgba(247, 148, 29, 0.2);
            padding-bottom: 8px;
        }

        input {
            width: 100%; padding: 12px; margin: 8px 0;
            background: #1a0a05; border: 1px solid var(--accent-gold);
            border-radius: 6px; color: white; box-sizing: border-box;
        }

        button {
            width: 100%; padding: 14px; margin: 8px 0;
            background: linear-gradient(90deg, var(--accent-gold), #d47a16);
            color: black; border: none; border-radius: 6px;
            font-weight: 800; text-transform: uppercase; cursor: pointer;
        }
        button:disabled { opacity: 0.5; }

        .stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin-bottom: 20px;
        }

        .stat-box {
            padding: 10px; background: rgba(0,0,0,0.3);
            border-radius: 8px; text-align: center;
            border-top: 2px solid var(--accent-gold);
        }
        .stat-box div { font-size: 1.5rem; font-weight: bold; }
        .stat-box small { text-transform: uppercase; opacity: 0.6; font-size: 0.6rem; }

        #video-container {
            width: 100%; max-width: 400px; margin: 10px auto;
            border: 2px solid var(--accent-gold); border-radius: 8px;
            overflow: hidden; background: #000;
        }
        #canvas { width: 100%; display: block; }
        .scan-feedback {
            padding: 15px; text-align: center; font-weight: bold;
            border-radius: 8px; margin-top: 10px; display: none;
        }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem;}
        th { color: var(--accent-gold); text-align: left; padding: 10px; text-transform: uppercase; border-bottom: 1px solid var(--accent-gold); }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .view { display: none; }
        .view.active { display: block; }
    </style>
</head>
<body>

<header>
    <h1>THE SALONIST: ADMIN</h1>
</header>
<div id="status-bar">Connected</div>

<div class="container">
    <div id="auth-view" class="view active">
        <div class="card" style="max-width: 400px; margin: 40px auto;">
            <h3>Organizer Access</h3>
            <input type="password" id="admin-pass" placeholder="Enter Access Code">
            <button onclick="checkAuth()">Open Dashboard</button>
        </div>
    </div>

    <div id="admin-dashboard" class="view">
        <div class="stats-grid">
            <div class="stat-box"><small>In</small><div id="stat-entered">0</div></div>
            <div class="stat-box"><small>Paid</small><div id="stat-paid">0</div></div>
            <div class="stat-box"><small>Total</small><div id="stat-total">0</div></div>
        </div>

        <div class="card">
            <h3>Entrance Scanner</h3>
            <div id="video-container">
                <canvas id="canvas" hidden></canvas>
                <div id="loadingMessage" style="padding: 20px; text-align: center;">Ready to Scan</div>
            </div>
            <div id="scan-feedback" class="scan-feedback"></div>
            <button id="start-scan-btn" onclick="startScanner()" style="background: var(--accent-red); color: white;">Launch Camera</button>
        </div>

        <div class="card">
            <h3>Manual Registration</h3>
            <input type="text" id="man-code" placeholder="M-Pesa Code" style="text-transform: uppercase;">
            <input type="text" id="man-name" placeholder="Full Name">
            <input type="text" id="man-phone" placeholder="Phone">
            <button id="add-btn" onclick="addTicket()">Register Ticket</button>
        </div>

        <div class="card">
            <h3>Attendance List</h3>
            <input type="text" id="search-input" placeholder="Search..." onkeyup="filterTable()">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Name</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tickets-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://mryhrceurixvchrfgkzf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yeWhyY2V1cml4dmNocmZna3pmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDQ4MzksImV4cCI6MjA4ODEyMDgzOX0.-Ynqq5oJO97RYEY4Dl2xVnND3fGEmE7fTcmmwIiEFQw';
    const ADMIN_PASSWORD = 'FP26'; 

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function checkAuth() {
        if (document.getElementById('admin-pass').value === ADMIN_PASSWORD) {
            document.getElementById('auth-view').remove(); 
            document.getElementById('admin-dashboard').classList.add('active');
            document.getElementById('status-bar').style.display = 'block';
            initApp();
        } else { alert("Access Denied"); }
    }

    let ticketList = [];

    async function initApp() {
        await refreshData();
        supabaseClient.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'tickets' }, () => refreshData()).subscribe();
    }

    async function refreshData() {
        try {
            const { data, error } = await supabaseClient.from('tickets').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            ticketList = data || [];
            renderDisplay();
        } catch (err) { console.error("Sync error:", err); }
    }

    async function addTicket() {
        const btn = document.getElementById('add-btn');
        const code = document.getElementById('man-code').value.trim().toUpperCase();
        const name = document.getElementById('man-name').value.trim();
        const phone = document.getElementById('man-phone').value.trim();

        if (!code || !name) return alert("Fill required fields!");
        btn.disabled = true;

        try {
            const { error } = await supabaseClient.from('tickets').insert([{ mpesa_code: code, name: name, phone: phone }]);
            if (error) throw error;
            document.getElementById('man-code').value = '';
            document.getElementById('man-name').value = '';
            document.getElementById('man-phone').value = '';
        } catch (err) { alert("Error: " + err.message); }
        finally { btn.disabled = false; }
    }

    async function checkIn(mpesaCode) {
        try {
            await supabaseClient.from('tickets').update({ status: 'entered', entered_at: new Date().toISOString() }).eq('mpesa_code', mpesaCode);
        } catch (err) { alert("Check-in failed."); }
    }

    function renderDisplay() {
        const tbody = document.getElementById('tickets-body');
        tbody.innerHTML = '';
        let entered = 0;

        ticketList.forEach(t => {
            if (t.status === 'entered') entered++;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="color:var(--accent-gold); font-family:monospace;">${t.mpesa_code}</td>
                <td>${t.name}</td>
                <td>
                    ${t.status === 'paid' ? 
                    `<button onclick="checkIn('${t.mpesa_code}')" style="padding:5px; font-size:0.7rem; margin:0; width:auto;">Grant Entry</button>` : 
                    `<span style="color:var(--success); font-weight:bold;">IN</span>`}
                </td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById('stat-entered').innerText = entered;
        document.getElementById('stat-paid').innerText = ticketList.length - entered;
        document.getElementById('stat-total').innerText = ticketList.length;
    }

    const v = document.createElement("video");
    const canvasElement = document.getElementById("canvas");
    const canvas = canvasElement.getContext("2d");
    const fb = document.getElementById("scan-feedback");

    function startScanner() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => {
            v.srcObject = s; v.setAttribute("playsinline", true); v.play();
            requestAnimationFrame(tick);
            document.getElementById('start-scan-btn').style.display = 'none';
            canvasElement.hidden = false;
            document.getElementById('loadingMessage').hidden = true;
        });
    }

    function tick() {
        if (v.readyState === v.HAVE_ENOUGH_DATA) {
            canvasElement.height = v.videoHeight; canvasElement.width = v.videoWidth;
            canvas.drawImage(v, 0, 0, canvasElement.width, canvasElement.height);
            const qr = jsQR(canvas.getImageData(0, 0, canvasElement.width, canvasElement.height).data, canvasElement.width, canvasElement.height);
            if (qr) {
                processCode(qr.data);
                setTimeout(() => requestAnimationFrame(tick), 3000);
                return;
            }
        }
        requestAnimationFrame(tick);
    }

    function processCode(data) {
        const code = data.trim().toUpperCase();
        const t = ticketList.find(x => x.mpesa_code === code);
        fb.style.display = 'block';
        if (!t) { 
            fb.style.background = 'var(--error)'; fb.innerText = `❌ INVALID: ${code}`; 
        } else if (t.status === 'entered') { 
            fb.style.background = 'var(--warning)'; fb.innerText = `⚠️ ALREADY IN: ${t.name}`; 
        } else { 
            fb.style.background = 'var(--success)'; fb.innerText = `✅ VALID: ${t.name}`; 
            checkIn(code); 
        }
    }

    function filterTable() {
        const q = document.getElementById('search-input').value.toLowerCase();
        document.querySelectorAll('#tickets-body tr').forEach(r => r.style.display = r.innerText.toLowerCase().includes(q) ? '' : 'none');
    }
</script>
</body>
</html>
